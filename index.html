<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I Love You</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

h1{
position:absolute;
top:40px;
width:100%;
text-align:center;
color:#00aaff;
font-size:60px;
text-shadow:0 0 20px #00aaff,0 0 40px #00aaff;
}

canvas{
display:block;
}
</style>

</head>

<body>

<h1>I Love You</h1>
<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heart(t){
return {
x:16Math.pow(Math.sin(t),3),
y:-(13Math.cos(t)-5Math.cos(2t)-2Math.cos(3t)-Math.cos(4t))
};
}

for(let i=0;i<2000;i++){

let t = Math.random()Math.PI2;

let pos = heart(t);

particles.push({
x:canvas.width/2 + pos.x20,
y:canvas.height/2 + pos.y*20,
size:Math.random()*2+1,
speed:Math.random()0.5+0.2
});

}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ccff";
ctx.shadowBlur=15;
ctx.shadowColor="#00ccff";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI2);
ctx.fill();

p.y -= p.speed;

if(p.y < 0){
p.y = canvas.height;
}

});

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
